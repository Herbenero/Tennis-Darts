<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Darts Tracker</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --tennis-green: #a3e635;
            --tennis-court: #0284c7;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --net-red: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background-color: var(--card-dark);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            padding: 20px;
            box-sizing: border-box;
            margin-top: 20px;
        }

        h1, h2, h3 {
            text-align: center;
            margin: 5px 0;
        }
        h1 { color: var(--tennis-green); }

        .screen { display: none; }
        .active { display: block; }

        /* Setup Screen */
        .input-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        input[type="text"] {
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
        }
        button {
            background-color: var(--tennis-green);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Dashboard Match Display */
        .match-score-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background-color: #0f172a;
            border-radius: 8px;
            overflow: hidden;
        }
        .match-score-table th, .match-score-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .match-score-table th { background-color: #1e293b; color: var(--text-muted); }
        
        /* Current Turn Status Box */
        .status-box {
            background-color: var(--tennis-court);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
        }
        .side-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            background-color: #0f172a;
            margin-top: 5px;
        }
        .side-left { color: #38bdf8; }
        .side-right { color: #f59e0b; }

        /* Controls Layout */
        .multiplier-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mult-btn {
            flex: 1;
            background-color: #334155;
            color: white;
        }
        .mult-btn.selected {
            background-color: var(--tennis-green);
            color: black;
        }
